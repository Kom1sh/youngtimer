<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Янгтаймер — База знаний и карта специалистов</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0e0e0e;
      --surface:      #181818;
      --card:         #1f1f1f;
      --border:       #2a2a2a;
      --accent:       #d97706;
      --accent-lt:    #f59e0b;
      --accent-dk:    #92400e;
      --text:         #e8e4dc;
      --muted:        #6b6560;
      --tag-bg:       #2c2218;
      --header-h:     64px;
      --bnav-h:       0px;   /* overridden on mobile */
    }

    html { scroll-behavior: smooth; height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── HEADER ──────────────────────────────────── */
    header {
      position: relative;
      z-index: 600;
      background: rgba(14,14,14,.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
      height: var(--header-h);
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon { width: 36px; height: 36px; }

    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--accent-lt);
      letter-spacing: .5px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: -2px;
    }

    nav.header-nav {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: none;
      color: var(--muted);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }

    .tab-btn:hover { color: var(--text); background: var(--surface); }
    .tab-btn.active {
      color: var(--accent-lt);
      background: var(--tag-bg);
      border-color: var(--accent-dk);
    }
    .tab-btn svg { flex-shrink: 0; }

    /* ─── VIEWS ───────────────────────────────────── */
    .view { display: none; flex: 1; min-height: 0; overflow: hidden; }
    .view.active { display: flex; flex-direction: column; }

    /* ─── KNOWLEDGE BASE ──────────────────────────── */
    .kb-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .kb-hero {
      background: linear-gradient(135deg, #1a0e00 0%, #0e0e0e 60%);
      border-bottom: 1px solid var(--border);
      padding: 56px 24px 48px;
      text-align: center;
    }

    .kb-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(24px, 4vw, 48px);
      color: var(--accent-lt);
      margin-bottom: 12px;
    }

    .kb-hero p {
      color: var(--muted);
      font-size: 15px;
      max-width: 520px;
      margin: 0 auto 28px;
      line-height: 1.6;
    }

    .search-wrap {
      position: relative;
      max-width: 520px;
      margin: 0 auto;
    }

    .search-wrap svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    #search-input {
      width: 100%;
      padding: 14px 16px 14px 46px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
    }

    #search-input:focus { border-color: var(--accent); }
    #search-input::placeholder { color: var(--muted); }

    .kb-body {
      max-width: 1280px;
      margin: 0 auto;
      padding: 40px 24px 60px;
      width: 100%;
    }

    .category-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 32px;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .pill:hover { border-color: var(--accent-dk); color: var(--text); }
    .pill.active { background: var(--tag-bg); border-color: var(--accent); color: var(--accent-lt); }

    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .article-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      cursor: pointer;
      transition: border-color .2s, transform .2s;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .article-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(217,119,6,.07) 0%, transparent 60%);
      opacity: 0;
      transition: opacity .3s;
    }

    .article-card:hover { border-color: var(--accent-dk); transform: translateY(-2px); }
    .article-card:hover::before { opacity: 1; }

    .article-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      background: var(--tag-bg);
      border: 1px solid var(--accent-dk);
      border-radius: 999px;
      font-size: 11px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 12px;
    }

    .article-card h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .article-card p {
      font-size: 13.5px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: var(--muted);
    }

    .article-meta span { display: flex; align-items: center; gap: 4px; }

    .difficulty { display: flex; gap: 3px; margin-left: auto; }

    .diff-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
    }

    .diff-dot.filled { background: var(--accent); }

    /* ─── ARTICLE MODAL ───────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 2000;
      backdrop-filter: blur(4px);
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
      overflow-y: auto;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 760px;
      width: 100%;
      margin: auto;
      padding: 40px;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color .2s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .modal-close:hover { color: var(--text); }

    .modal h2 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      margin-bottom: 8px;
      line-height: 1.3;
      padding-right: 40px;
    }

    .modal-meta {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .modal-body { font-size: 15px; line-height: 1.8; color: #c8c0b4; }
    .modal-body h4 { font-size: 16px; color: var(--text); margin: 20px 0 8px; }
    .modal-body ul { padding-left: 20px; }
    .modal-body ul li { margin-bottom: 6px; }
    .modal-body .warn {
      background: #1f1500;
      border-left: 3px solid var(--accent);
      padding: 12px 16px;
      border-radius: 0 8px 8px 0;
      margin: 16px 0;
      font-size: 13.5px;
    }

    /* ─── MAP VIEW ────────────────────────────────── */
    #view-map { position: relative; }

    .map-toolbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .map-toolbar-label { font-size: 13px; color: var(--muted); white-space: nowrap; }

    .spec-filter-pills { display: flex; gap: 8px; flex-wrap: wrap; }

    .spec-pill {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--card);
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .spec-pill:hover { border-color: var(--accent-dk); color: var(--text); }
    .spec-pill.active { background: var(--tag-bg); border-color: var(--accent); color: var(--accent-lt); }

    .map-container {
      flex: 1;
      display: grid;
      grid-template-columns: 340px 1fr;
      min-height: 0;
    }

    .specialists-sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      -webkit-overflow-scrolling: touch;
    }

    .sidebar-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }

    .sidebar-header h3 { font-size: 14px; font-weight: 600; }
    .sidebar-header span { font-size: 12px; color: var(--muted); }

    .specialist-card {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .2s;
      -webkit-tap-highlight-color: transparent;
    }

    .specialist-card:hover { background: var(--card); }
    .specialist-card.selected { background: var(--tag-bg); border-left: 3px solid var(--accent); padding-left: 17px; }

    .spec-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }

    .spec-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }

    .spec-tag {
      padding: 2px 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 11px;
      color: var(--muted);
    }

    .specialist-card.selected .spec-tag {
      background: var(--surface);
      border-color: var(--accent-dk);
      color: var(--accent);
    }

    .spec-info { font-size: 12px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; }
    .spec-info span { display: flex; align-items: center; gap: 3px; }
    .spec-rating { color: var(--accent-lt); font-weight: 600; }

    #map { height: 100%; min-height: 500px; background: #111; }

    .leaflet-popup-content-wrapper {
      background: var(--card) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      border-radius: 12px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,.5) !important;
    }

    .leaflet-popup-tip { background: var(--card) !important; }
    .leaflet-popup-content { margin: 14px 16px !important; }

    .popup-name { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .popup-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .popup-tag {
      padding: 2px 8px;
      background: var(--tag-bg);
      border: 1px solid var(--accent-dk);
      border-radius: 999px;
      font-size: 11px;
      color: var(--accent);
    }
    .popup-row { font-size: 13px; color: #a09890; margin-bottom: 3px; }
    .popup-phone { color: var(--accent-lt); font-weight: 500; }

    .demo-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 500;
      background: rgba(14,14,14,.88);
      border: 1px solid var(--accent-dk);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: .8px;
      text-transform: uppercase;
      backdrop-filter: blur(6px);
    }

    .map-wrapper { position: relative; flex: 1; overflow: hidden; }

    /* ─── BOTTOM SHEET (mobile only) ─────────────── */
    .bottom-sheet {
      display: none; /* shown only on mobile via media query */
    }

    /* ─── BOTTOM NAV (mobile only) ───────────────── */
    .bottom-nav {
      display: none; /* shown only on mobile */
    }

    /* ─── MISC ────────────────────────────────────── */
    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 15px;
      grid-column: 1/-1;
    }

    .no-results svg { margin-bottom: 12px; opacity: .4; display: block; margin-left: auto; margin-right: auto; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* ═══════════════════════════════════════════════
       DESKTOP ONLY adjustments
    ═══════════════════════════════════════════════ */
    @media (min-width: 769px) {
      .tab-btn span { display: inline; }
    }

    /* ═══════════════════════════════════════════════
       TABLET: ≤ 1024px
    ═══════════════════════════════════════════════ */
    @media (max-width: 1024px) {
      .map-container { grid-template-columns: 300px 1fr; }
    }

    /* ═══════════════════════════════════════════════
       MOBILE: ≤ 768px  — full overhaul
    ═══════════════════════════════════════════════ */
    @media (max-width: 768px) {
      :root {
        --header-h: 52px;
        --bnav-h:   60px;
      }

      /* ── Header compact ── */
      .header-inner { padding: 0 16px; height: var(--header-h); gap: 12px; }
      .logo-text { font-size: 18px; }
      .logo-sub { display: none; }
      .logo-icon { width: 30px; height: 30px; }
      nav.header-nav { display: none; } /* tabs move to bottom nav */

      /* ── Body padding for bottom nav ── */
      body { padding-bottom: var(--bnav-h); }

      /* ── Bottom navigation ── */
      .bottom-nav {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: var(--bnav-h);
        background: rgba(14,14,14,.97);
        border-top: 1px solid var(--border);
        backdrop-filter: blur(16px);
        z-index: 800;
        padding-bottom: env(safe-area-inset-bottom, 0);
      }

      .bnav-btn {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        background: none;
        border: none;
        color: var(--muted);
        font-family: inherit;
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        transition: color .2s;
        padding: 8px 0;
        -webkit-tap-highlight-color: transparent;
        letter-spacing: .2px;
      }

      .bnav-btn.active { color: var(--accent-lt); }

      .bnav-btn svg {
        transition: transform .2s;
      }

      .bnav-btn.active svg { transform: scale(1.1); }

      .bnav-indicator {
        position: absolute;
        top: 0;
        height: 2px;
        width: 50%;
        background: var(--accent);
        border-radius: 0 0 2px 2px;
        transition: left .25s cubic-bezier(.4,0,.2,1);
        left: 0;
      }

      /* ── KB mobile ── */
      .kb-hero {
        padding: 32px 16px 24px;
      }

      .kb-hero p { display: none; }

      .kb-body { padding: 20px 16px 80px; }

      .category-pills {
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        margin-bottom: 20px;
        padding-bottom: 2px;
      }

      .category-pills::-webkit-scrollbar { display: none; }

      .articles-grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .article-card { padding: 18px; }
      .article-card h3 { font-size: 15px; }

      /* ── Map view on mobile ── */
      #view-map { overflow: hidden; }

      .map-toolbar { display: none; }

      .map-container {
        display: block;
        flex: 1;
        position: relative;
        min-height: 0;
      }

      .specialists-sidebar { display: none; }

      .map-wrapper {
        position: absolute;
        inset: 0;
      }

      #map { height: 100%; min-height: unset; }

      /* ── Bottom Sheet ── */
      .bottom-sheet {
        display: flex;
        flex-direction: column;
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        /* height fills (view height - small map peek area) */
        height: calc(100% - 56px);
        background: var(--surface);
        border-radius: 20px 20px 0 0;
        border-top: 1px solid var(--border);
        box-shadow: 0 -8px 40px rgba(0,0,0,.5);
        z-index: 400;
        /* default: peek state — 200px showing */
        transform: translateY(calc(100% - 200px));
        transition: transform .35s cubic-bezier(.32,.72,0,1);
        will-change: transform;
        overflow: hidden;
      }

      .sheet-handle-area {
        flex-shrink: 0;
        padding: 10px 0 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: grab;
        touch-action: none;
      }

      .sheet-handle-bar {
        width: 36px;
        height: 4px;
        border-radius: 2px;
        background: var(--border);
      }

      .sheet-top {
        flex-shrink: 0;
        border-bottom: 1px solid var(--border);
        padding-bottom: 10px;
      }

      .sheet-filter-row {
        padding: 4px 16px 8px;
        display: flex;
        gap: 8px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }

      .sheet-filter-row::-webkit-scrollbar { display: none; }

      .sheet-filter-row .spec-pill {
        flex-shrink: 0;
        font-size: 12px;
        padding: 5px 12px;
      }

      .sheet-header-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 16px 4px;
      }

      .sheet-header-row h3 { font-size: 14px; font-weight: 600; }
      .sheet-header-row span { font-size: 12px; color: var(--muted); }

      .sheet-list {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      /* Sheet specialist cards (slightly denser than desktop sidebar) */
      .sheet-list .specialist-card {
        padding: 14px 16px;
      }

      /* When sheet is fully expanded — show a close-to-map button */
      .sheet-map-btn {
        position: absolute;
        top: -48px;
        right: 16px;
        background: rgba(14,14,14,.9);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 8px 16px;
        font-size: 12px;
        font-weight: 500;
        color: var(--text);
        cursor: pointer;
        backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        gap: 6px;
        box-shadow: 0 2px 12px rgba(0,0,0,.4);
        transition: opacity .2s;
        opacity: 0;
        pointer-events: none;
        -webkit-tap-highlight-color: transparent;
      }

      .bottom-sheet[data-state="full"] .sheet-map-btn {
        opacity: 1;
        pointer-events: auto;
      }

      /* Floating demo badge repositioned for mobile */
      .demo-badge {
        top: 10px;
        right: 10px;
        font-size: 10px;
        padding: 4px 8px;
      }

      /* Map floating controls */
      .map-float-controls {
        display: flex !important;
      }

      /* ── Article modal mobile: bottom sheet ── */
      .modal-overlay {
        align-items: flex-end;
        padding: 0;
        overflow: hidden;
      }

      .modal {
        border-radius: 20px 20px 0 0;
        max-width: 100%;
        margin: 0;
        padding: 24px 20px;
        max-height: 92vh;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        border: none;
        border-top: 1px solid var(--border);
        /* slide in from bottom */
        animation: slideUp .3s cubic-bezier(.32,.72,0,1);
      }

      .modal h2 { font-size: 20px; padding-right: 36px; }

      .modal-body { font-size: 14px; }
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    /* ─── Map floating controls ────────────────────── */
    .map-float-controls {
      display: none;
      position: absolute;
      left: 16px;
      bottom: 210px;
      z-index: 500;
      flex-direction: column;
      gap: 8px;
    }

    .map-float-btn {
      width: 44px;
      height: 44px;
      background: rgba(20,20,20,.9);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      align-items: center;

const bnavIndicator = document.getElementById('bnav-indicator');
let mapInitialized = false;

function switchView(which) {
  allTabBtns.forEach(b => b.classList.toggle('active', b.dataset.view === which));
  Object.entries(viewEls).forEach(([k, v]) => v.classList.toggle('active', k === which));

  // Bottom nav indicator
  bnavIndicator.style.left = which === 'kb' ? '0' : '50%';

  if (which === 'map' && !mapInitialized) {
    initMap();
    mapInitialized = true;
  }

  if (which === 'map' && mapInitialized && leafletMap) {
    setTimeout(() => leafletMap.invalidateSize(), 50);
  }
}

allTabBtns.forEach(btn => btn.addEventListener('click', () => switchView(btn.dataset.view)));

let currentCat = 'all';
let searchQuery = '';

function renderArticles() {
  const grid = document.getElementById('articles-grid');
  const filtered = ARTICLES.filter(a => {
    const matchCat = currentCat === 'all' || a.cat === currentCat;
    const q = searchQuery.toLowerCase();
    const matchQ = !q || a.title.toLowerCase().includes(q) || a.preview.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  if (!filtered.length) {
    grid.innerHTML = `<div class="no-results">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <div>Ничего не найдено</div>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(a => {
    const dots = [1,2,3].map(i => `<div class="diff-dot${i <= a.difficulty ? ' filled' : ''}"></div>`).join('');
    return `
    <div class="article-card" data-id="${a.id}">
      <div class="article-tag">${CAT_LABELS[a.cat] || a.cat}</div>
      <h3>${a.title}</h3>
      <p>${a.preview}</p>
      <div class="article-meta">
        <span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${a.time}
        </span>
        <span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          ${a.views}
        </span>
        <div class="difficulty" title="Сложность">${dots}</div>
      </div>
    </div>`;
  }).join('');

  grid.querySelectorAll('.article-card').forEach(card => {
    card.addEventListener('click', () => openArticle(+card.dataset.id));
  });
}

document.getElementById('category-pills').addEventListener('click', e => {

  const dots = [1,2,3].map(i => `<div class="diff-dot${i <= a.difficulty ? ' filled' : ''}"></div>`).join('');

function initMap() {
  leafletMap = L.map('map', { center: [56, 44], zoom: 5, zoomControl: true });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/">OpenStreetMap</a>',
    maxZoom: 18
  }).addTo(leafletMap);

  markersLayer = L.layerGroup().addTo(leafletMap);
  renderSpecialists();

  // Tap on map (mobile) → close/minimize sheet
  leafletMap.on('click', () => {
    if (isMobile()) snapSheet('peek');
  });

  // Floating controls
  document.getElementById('btn-zoom-russia').addEventListener('click', () => {
    leafletMap.setView([56, 44], 5, { animate: true });
  });

  document.getElementById('btn-my-location').addEventListener('click', () => {
    navigator.geolocation && navigator.geolocation.getCurrentPosition(pos => {
      leafletMap.setView([pos.coords.latitude, pos.coords.longitude], 10, { animate: true });
    }, () => {
      leafletMap.setView([55.75, 37.62], 10, { animate: true }); // fallback: Moscow
    });
  });

  // Sheet "back to map" button
  document.getElementById('sheet-map-btn').addEventListener('click', () => snapSheet('peek'));

  // Init bottom sheet drag
  initSheetDrag();

  // Sheet filter pills
  document.getElementById('sheet-filter-row').addEventListener('click', e => {

    pill.classList.add('active');

    selectedId = null;
    renderSpecialists();

function buildPopup(s) {
  const tags = s.specs.map(sp => `<span class="popup-tag">${SPEC_LABELS[sp]||sp}</span>`).join('');
  return `
    <div class="popup-name">${s.name}</div>
    <div class="popup-tags">${tags}</div>
    <div class="popup-row">📍 ${s.city}, ${s.addr}</div>
    <div class="popup-row">★ ${s.rating} · Опыт ${s.exp} лет</div>
    <div class="popup-row popup-phone">📞 ${s.phone}</div>
  `;
}

function specialistCardHTML(s) {
  const tags = s.specs.map(sp => `<span class="spec-tag">${SPEC_LABELS[sp]||sp}</span>`).join('');
  return `
    <div class="specialist-card" data-id="${s.id}">
      <div class="spec-name">${s.name}</div>
      <div class="spec-tags">${tags}</div>
      <div class="spec-info">
        <span>📍 ${s.city}</span>
        <span class="spec-rating">★ ${s.rating}</span>
        <span>Опыт: ${s.exp} лет</span>
      </div>
    </div>`;
}

function renderSpecialists() {
  if (!markersLayer) return;
  markersLayer.clearLayers();
  Object.keys(markerRefs).forEach(k => delete markerRefs[k]);

  const filtered = SPECIALISTS.filter(s =>
    currentSpecFilter === 'all' || s.specs.includes(currentSpecFilter)
  );

  const countText = `${filtered.length} специалистов`;
  document.getElementById('spec-count').textContent = countText;
  document.getElementById('sheet-spec-count').textContent = countText;

  const html = filtered.map(specialistCardHTML).join('');

  // Desktop sidebar
  const list = document.getElementById('specialists-list');
  list.innerHTML = html;
  list.querySelectorAll('.specialist-card').forEach(card => {
    card.addEventListener('click', () => selectSpecialist(+card.dataset.id));
  });

  // Mobile sheet list
  const sheetList = document.getElementById('sheet-list');
  sheetList.innerHTML = html;
  sheetList.querySelectorAll('.specialist-card').forEach(card => {
    card.addEventListener('click', () => selectSpecialist(+card.dataset.id));
  });

  // Markers
  filtered.forEach(s => {
    const marker = L.marker([s.lat, s.lng], { icon: customIcon })
      .addTo(markersLayer)
      .bindPopup(buildPopup(s), { maxWidth: 280 });

    marker.on('click', () => selectSpecialist(s.id, false));
    markerRefs[s.id] = marker;
  });
}

function selectSpecialist(id, panTo = true) {
  if (selectedId && markerRefs[selectedId]) markerRefs[selectedId].setIcon(customIcon);
  selectedId = id;

  // Highlight cards in both sidebar and sheet
  document.querySelectorAll('.specialist-card').forEach(c => {
    c.classList.toggle('selected', +c.dataset.id === id);
  });

  const marker = markerRefs[id];
  if (marker) {
    marker.setIcon(customIconSelected);
    if (!isMobile()) marker.openPopup();
    if (panTo && leafletMap) {
      const s = SPECIALISTS.find(x => x.id === id);
      if (s) leafletMap.setView([s.lat, s.lng], 12, { animate: true });
    }
  }

  // Scroll desktop sidebar card
  const sideCard = document.querySelector(`#specialists-list .specialist-card[data-id="${id}"]`);
  if (sideCard) sideCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  // On mobile: expand sheet to half, scroll to card
  if (isMobile()) {
    snapSheet('half');
    setTimeout(() => {
      const sheetCard = document.querySelector(`#sheet-list .specialist-card[data-id="${id}"]`);
      if (sheetCard) sheetCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 300);
  }
}

  if (mapInitialized) renderSpecialists();
});

/* ══════════════════════════════════════════════════════════

══════════════════════════════════════════════════════════ */

let sheetDragging = false;
let sheetStartY = 0;
let sheetStartTranslate = 0;
let sheetCurrentTranslate = 0;

const SNAP = { peek: 0, half: 0, full: 0 }; // filled by computeSnap()

function computeSnap() {
  const sheet = document.getElementById('bottom-sheet');
  const h = sheet.offsetHeight;
  SNAP.peek = h - 200;
  SNAP.half = Math.round(h * 0.38);
  SNAP.full = 0;
}

function setSheetY(y, animate) {
  const sheet = document.getElementById('bottom-sheet');
  sheet.style.transition = animate ? 'transform .35s cubic-bezier(.32,.72,0,1)' : 'none';
  sheet.style.transform = `translateY(${y}px)`;
  sheetCurrentTranslate = y;
}

function snapSheet(state) {
  computeSnap();
  const y = SNAP[state];
  setSheetY(y, true);
  document.getElementById('bottom-sheet').dataset.state = state;
  // Update float controls position
  const floatControls = document.getElementById('map-float-controls');
  if (floatControls) {
    const visible = Math.min(200, document.getElementById('bottom-sheet').offsetHeight - y);
    floatControls.style.bottom = (visible + 12) + 'px';
  }
}

function initSheetDrag() {
  const handleArea = document.getElementById('sheet-handle-area');
  const sheetTop   = document.querySelector('.sheet-top');

  function onDragStart(clientY) {
    computeSnap();
    sheetDragging = true;
    sheetStartY = clientY;
    sheetStartTranslate = sheetCurrentTranslate;
    document.getElementById('bottom-sheet').style.transition = 'none';
  }

  function onDragMove(clientY) {
    if (!sheetDragging) return;
    const dy = clientY - sheetStartY;
    const raw = sheetStartTranslate + dy;
    const clamped = Math.max(SNAP.full, Math.min(SNAP.peek, raw));
    setSheetY(clamped, false);
  }

  function onDragEnd(clientY) {
    if (!sheetDragging) return;
    sheetDragging = false;
    const dy = clientY - sheetStartY;

    let target;
    if (dy > 60)        target = sheetCurrentTranslate > SNAP.half ? 'peek' : 'half';
    else if (dy < -60)  target = sheetCurrentTranslate < SNAP.half ? 'full' : 'half';
    else {
      const dists = Object.fromEntries(Object.entries(SNAP).map(([k,v]) => [k, Math.abs(sheetCurrentTranslate - v)]));
      target = Object.keys(dists).reduce((a, b) => dists[a] < dists[b] ? a : b);
    }
    snapSheet(target);
  }

  // Touch events on handle
  [handleArea, sheetTop].forEach(el => {
    if (!el) return;
    el.addEventListener('touchstart', e => { onDragStart(e.touches[0].clientY); }, { passive: true });
  });

  document.addEventListener('touchmove', e => {
    if (!sheetDragging) return;
    onDragMove(e.touches[0].clientY);
  }, { passive: true });

  document.addEventListener('touchend', e => {
    if (!sheetDragging) return;
    onDragEnd(e.changedTouches[0].clientY);
  });

  // Mouse drag (for DevTools mobile simulation)
  [handleArea, sheetTop].forEach(el => {
    if (!el) return;
    el.addEventListener('mousedown', e => {
      onDragStart(e.clientY);
      const onMove = ev => onDragMove(ev.clientY);
      const onUp   = ev => { onDragEnd(ev.clientY); document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });

  // Initialize to peek position once map is rendered
  requestAnimationFrame(() => {
    computeSnap();
    setSheetY(SNAP.peek, false);
    document.getElementById('bottom-sheet').dataset.state = 'peek';
  });
}

/* ══════════════════════════════════════════════════════════
   RESIZE
══════════════════════════════════════════════════════════ */
window.addEventListener('resize', () => {
  if (mapInitialized && leafletMap) leafletMap.invalidateSize();
  if (isMobile() && mapInitialized) {
    const state = document.getElementById('bottom-sheet').dataset.state || 'peek';
    snapSheet(state);
  }
});

</script>
</body>
